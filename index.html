<!DOCTYPE html>
<html>
<head>
    <title>Hello World Boxes</title>
    </head>
    <body>
        <!-- Box 1 -->
            <div style="
                    background-color: lightblue;
                            color: black;
                                    font-weight: bold;
                                            border: 5px double red;
                                                    padding: 20px;
                                                            margin: 10px;">
                                                                    Hello World
                                                                        </div>

                                                                            <!-- Box 2 -->
                                                                                <div style="
                                                                                        background-color: yellow;
                                                                                                color: black;
                                                                                                        font-weight: bold;
                                                                                                                border: 5px solid blue;
                                                                                                                        border-radius: 15px;
                                                                                                                                padding: 20px;
                                                                                                                                        margin: 10px;">
                                                                                                                                                Hello World
                                                                                                                                                    </div>

                                                                                                                                                        <!-- Box 3 -->
                                                                                                                                                            <div style="
                                                                                                                                                                    background-color: green;
                                                                                                                                                                            color: black;
                                                                                                                                                                                    font-weight: bold;
                                                                                                                                                                                            padding: 20px;
                                                                                                                                                                                                    margin: 10px;
                                                                                                                                                                                                            background-image: radial-gradient(purple 10%, transparent 11%);
                                                                                                                                                                                                                    background-size: 30px 30px;">
                                                                                                                                                                                                                            Hello World
                                                                                                                                                                                                                                </div>
                                                                                                                                                                                                                                </body>
                                                                                                                                                                                                                                </html>
